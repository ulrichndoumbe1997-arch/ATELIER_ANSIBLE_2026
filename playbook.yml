---
- name: Atelier Ansible dans GitHub Codespaces - DEV / PROD
  hosts: all
  become: true
  gather_facts: true

  vars:
    page_dest: /var/www/html/index.html
    page_title: "Serveur déployé avec Ansible"
    yarn_repo_file: /etc/apt/sources.list.d/yarn.list
    yarn_repo_disabled_file: /etc/apt/sources.list.d/yarn.list.disabled

  tasks:
    - name: Afficher le système cible
      debug:
        msg:
          - "Hôte cible : {{ inventory_hostname }}"
          - "Groupes : {{ group_names }}"

    - name: Vérifier si le dépôt Yarn existe
      stat:
        path: "{{ yarn_repo_file }}"
      register: yarn_repo_stat

    - name: Désactiver temporairement le dépôt Yarn
      command: mv "{{ yarn_repo_file }}" "{{ yarn_repo_disabled_file }}"
      when: yarn_repo_stat.stat.exists
      changed_when: true

    - name: Mettre à jour le cache APT
      apt:
        update_cache: true

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Vérifier que le répertoire web existe
      file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Définir les variables DEV
      set_fact:
        app_name: "Application DEV"
        env: "dev"
        author: "Etudiant DEV"
        app_user: "Ulrich"
      when: "'dev' in group_names"

    - name: Définir les variables PROD
      set_fact:
        app_name: "Application PROD"
        env: "prod"
        author: "Equipe Ops"
        app_user: "Ulrich"
      when: "'prod' in group_names"

    - name: Déployer la page HTML depuis un template
      template:
        src: templates/index.html.j2
        dest: "{{ page_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Redémarrer nginx

    - name: Activer nginx au démarrage
      service:
        name: nginx
        enabled: true

    - name: Démarrer nginx
      service:
        name: nginx
        state: started

    - name: Vérifier que le site répond en HTTP
      uri:
        url: http://localhost
        method: GET
        status_code: 200
        return_content: true
      register: test_http
      retries: 5
      delay: 2
      until: test_http.status == 200

    - name: Afficher le code HTTP retourné
      debug:
        msg: "Le serveur répond avec le code HTTP {{ test_http.status }}"

  handlers:
    - name: Redémarrer nginx
      service:
        name: nginx
        state: restarted